databases:
  - name: marketing-db
    plan: free

services:
  - type: web
    name: marketing-microsite
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn djangotesttask_api.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketing-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.13.4"
      - key: FB_GRAPH_VERSION
        value: "v25.0"
      - key: FB_PAGE_ID
        sync: false                # ← секреты вводишь в дашборде, не в репо
      - key: FB_PAGE_ACCESS_TOKEN
        sync: false
      - key: BUFFER_ACCESS_TOKEN
        sync: false
      - key: BUFFER_PROFILE_ID
        sync: false